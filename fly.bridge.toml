# Fly.io configuration for the Media Streams bridge server
# Deploy with: fly launch --config fly.bridge.toml

app = "crm-voice-bridge"
primary_region = "sin"  # Singapore — closest to South Asia + SEA

[build]
  dockerfile = "Dockerfile.bridge"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep warm for voice calls
  auto_start_machines = true
  min_machines_running = 1     # Always have at least 1 warm instance

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
